name: SBMSA Nightly Update

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run scraper and ranking engine
        run: |
          python scripts/scrape_and_rank.py

      - name: Build HTML
        run: |
          python scripts/build_html.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.json data/ratings_history.json data/latest.json season_predictions.html
          git diff --staged --quiet || git commit -m "Nightly update: $(date -u +'%Y-%m-%d')"
          git push
